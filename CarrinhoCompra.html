<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Carrinho de Compras | RobotCard</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="CarrinhoCompra.css" />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        />
        <link
            rel="shortcut icon"
            href="imgs/icons/favicon.png"
            type="image/x-icon"
        />
    </head>
    <body>
        <header>
            <div class="topbar">
                <div class="logo">
                    <a
                        href="index.html"
                        style="text-decoration: none; color: inherit"
                        >RobotCard</a
                    >
                </div>

                <a href="javascript:history.back()" class="back-btn">
                    <i class="fa-solid fa-arrow-left"></i> Voltar
                </a>
            </div>
        </header>

        <div class="cart-container">
            <h2><i class="fa-solid fa-cart-shopping"></i> Seu Carrinho</h2>

            <div class="cart-content">
                <div class="cart-items" id="cart-items-container">
                    <div class="cart-item" data-id="kopenhagen_gift_50">
                        <div class="img-info-group">
                            <img src="imgs/icons/favicon.png" alt="Gift Card" />
                            <div class="item-info">
                                <h3>Gift Card Kopenhagen R$ 50</h3>
                                <p class="item-category">Premium</p>
                            </div>
                        </div>

                        <div class="item-group">
                            <div class="item-quantity">
                                <button class="btn-qty minus">-</button>
                                <span class="qty-number">1</span>
                                <button class="btn-qty plus">+</button>
                            </div>
                            <div class="item-price">R$ 50,00</div>
                            <button class="btn-remove">
                                <i class="fa-solid fa-trash"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="cart-summary">
                    <h3>Resumo do Pedido</h3>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">R$ 0,00</span>
                    </div>
                    <div class="summary-row">
                        <span>Entrega Digital</span>
                        <span class="free-shipping">Instantânea</span>
                    </div>
                    <hr />
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="total-price">R$ 0,00</span>
                    </div>
                    <button class="btn-checkout">Finalizar Compra</button>
                    <a href="index.html" class="continue-shopping"
                        >Continuar Comprando</a
                    >
                </div>
            </div>
        </div>

        <script type="module" src="js/CarrinhoCompra.js"></script>
    </body>
</html>
