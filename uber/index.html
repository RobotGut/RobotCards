<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uber Gift Card</title>

  <link rel="stylesheet" href="../gift-page.css">
</head>

<body>

<header class="topbar">

  <h1>Uber Gift Card</h1>

  <a href="../index.html">← Voltar</a>

</header>

<section class="product">

  <div class="product-image uber"></div>

  <div class="product-info">

    <h2>Uber Gift Card</h2>

    <p class="description">
 Use créditos para viagens e pedidos no app.
    </p>

    <div class="badges">

      <span>⚡ Entrega imediata</span>
      <span>🔒 Compra segura</span>
      <span>🎧 Suporte online</span>

    </div>

    <h3>Escolha o valor:</h3>

    <div class="prices">

      <button>R$ 30</button>
      <button>R$ 60</button>
      <button>R$ 100</button>
      <button>R$ 200</button>

    </div>

    <div class="actions">

      <button class="buy">
        Comprar agora
      </button>

      <button class="cart">
        Adicionar ao carrinho
      </button>

    </div>

  </div>

</section>

</body>
</html>
