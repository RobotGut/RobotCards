<!DOCTYPE html>
<html lang="pt-br">
<head>

 <title>Carrinho de Compras</title>
 <link rel="stylesheet" href="Carrinho de Compra.css">
 <style>
   /* Adicione estilos básicos aqui */
   .cart { max-width: 600px; margin: auto; }

 </style>
</head>
<body>
 <div class="cart">
   <h1>Carrinho de Compras</h1>

   <button onclick="finalizarCompra()">Finalizar Compra</button>
 </div>
 <script src="Carrinho de Compra.js"></script>
</body>
