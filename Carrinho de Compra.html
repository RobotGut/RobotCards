<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho de Compras</title>     
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Carrinho de Compra.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="shortcut icon" href="../imgs/icons/favicon.png" type="image/x-icon">
</head>
<body>
<header>
      <div class="topbar">
        <div class="logo">RobotCard</div>  
        
<!-- Link que volta para a página anterior -->
<a href="javascript:history.back()" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Voltar</a>

</div>
</header>
<div class="cart-container">
        <h2><i class="fa-solid fa-cart-shopping"></i> Seu Carrinho</h2>
        
        <div class="cart-content">
            <div class="cart-items">
                
                <div class="cart-item" data-price="249.90">
                    <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=150" alt="Tênis Esportivo">
                    <div class="item-info">
                        <h3>Tênis Esportivo Nitro</h3>
                        <p class="item-category">Calçados</p>
                    </div>
                    <div class="item-quantity">
                        <button class="btn-qty minus">-</button>
                        <span class="qty-number">1</span>
                        <button class="btn-qty plus">+</button>
                    </div>
                    <div class="item-price">R$ 249,90</div>
                    <button class="btn-remove"><i class="fa-solid fa-trash"></i></button>
                </div>

                <div class="cart-item" data-price="89.90">
                    <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=150" alt="Camiseta Algodão">
                    <div class="item-info">
                        <h3>Camiseta Minimalist</h3>
                        <p class="item-category">Vestuário</p>
                    </div>
                    <div class="item-quantity">
                        <button class="btn-qty minus">-</button>
                        <span class="qty-number">1</span>
                        <button class="btn-qty plus">+</button>
                    </div>
                    <div class="item-price">R$ 89,90</div>
                    <button class="btn-remove"><i class="fa-solid fa-trash"></i></button>
                </div>

            </div>

            <div class="cart-summary">
                <h3>Resumo do Pedido</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="subtotal">R$ 0,00</span>
                </div>
                <div class="summary-row">
                    <span>Frete</span>
                    <span class="free-shipping">Grátis</span>
                </div>
                <hr>
                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total-price">R$ 0,00</span>
                </div>
                <button class="btn-checkout">Finalizar Compra</button>
                <a href="index.html" class="continue-shopping">Continuar Comprando</a>
            </div>
        </div>
    </div>

    <script src="Carrinho de Compra.js"></script>
</body>
</html>
